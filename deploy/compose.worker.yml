services:
  worker:
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    env_file:
      - ./env/worker.env
    environment:
      NVIDIA_VISIBLE_DEVICES: ${WORKER_GPU_ID:-0}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    networks:
      - gvhmr-control
    volumes:
      - worker-scratch:/var/lib/gvhmr-batch-process
      - type: bind
        source: ${MODEL_ROOT:-../models}
        target: /app/gvhmr/inputs/checkpoints
        read_only: true
    gpus: all
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
