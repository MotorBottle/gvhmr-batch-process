services:
  worker:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
      args:
        TORCH_CUDA_ARCH_LIST: "${WORKER_TORCH_CUDA_ARCH_LIST:-7.5;8.0;8.6;8.9}"
    env_file:
      - ./env/worker.env
    environment:
      NVIDIA_VISIBLE_DEVICES: ${WORKER_GPU_ID:-0}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    networks:
      - gvhmr-control
    volumes:
      - worker-scratch:/var/lib/gvhmr-batch-process
      - type: bind
        source: ${MODEL_ROOT:-../models}
        target: /app/gvhmr/inputs/checkpoints
        read_only: true
    gpus: all
    healthcheck:
      test: ["CMD", "python", "-m", "gvhmr_batch_worker.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
